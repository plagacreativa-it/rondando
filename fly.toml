# fly.toml — Fly.io deployment configuration
# Replace "rodando" with your unique app name (must be globally unique on Fly.io)
app = "rodando"
primary_region = "gru"  # São Paulo — closest to Argentina

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite database
[[mounts]]
  source = "rodando_data"
  destination = "/app/data"
  initial_size = "1gb"

# Persistent volume for uploaded files
[[mounts]]
  source = "rodando_uploads"
  destination = "/app/uploads"
  initial_size = "2gb"
