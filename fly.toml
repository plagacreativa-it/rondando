# fly.toml — Fly.io deployment configuration
app = "rondando"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Single persistent volume: SQLite DB + uploads
[[mounts]]
  source = "rodando_data"
  destination = "/app/data"
  initial_size = "3gb"
